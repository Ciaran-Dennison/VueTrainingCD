<html>
    <head>
        <title>User Details Form</title>
        <link rel="stylesheet" type="text/css" href="UserForm.css"/>
    </head>
    <body>
        <h1>User Details Form</h1>
        <form action="/submit" method="post">
            <fieldset>
                <div>
                    <label for="firstname">First Name</label> </br> <input class="grey-background" type="text" id="firstname" name="first_name"/>
                    </br>
                    <label for="lastname">Last Name</label> </br> <input class="grey-background" type="text" id="lastname" name="last_name"/>
                    </br>
                    <label for="birthdate">Date of Birth</label> </br> <input class="grey-background" type="date" id="birthdate" name="date_of_birth"/>
                    </br>
                    <label for="colour">Eye Colour</label> <br> <select class="grey-background" id="colour" name="eye_colour">
                        <option value="Blue">Blue</option>
                        <option value="Green">Green</option>
                        <option value="Brown">Brown</option>
                        <option value="Hazel">Hazel</option>
                        <option value="Grey">Grey</option>
                        <option value="Red">Red</option>
                    </select>
                </div>
                <div>
                    <label for="email">Email</label> </br> <input class="grey-background" type="email" id="email" name="email"/>
                    </br>
                    <label for="username">Username</label> </br> <input class="grey-background" type="text" id="username" name="username"/>
                    
                </div>
                <div>
                    <label for="address1">Address Line 1</label> </br> <input class="grey-background" type="text" id="address1" name="address_line_1"/>
                    </br>
                    <label for="address2">Address Line 2</label> </br> <input class="grey-background" type="text" id="address2" name="address_line_2"/>
                    </br>
                    <label for="address3">Address Line 3</label> </br> <input class="grey-background" type="text" id="address3" name="address_line_3"/>
                </div>
                <div>
                    <label for="city">City/Town</label> </br> <input class="grey-background" type="text" id="city" name="city_town"/>  
                    </br>
                    <label for="county">County</label> </br> <input class="grey-background" type="text" id="county" name="county"/> 
                    </br>
                    <label for="postcode">Postcode</label> </br> <input class="grey-background" type="text" id="postcode" name="postcode"/>
                </div>
                <div>
                    <label for="phone">Phone Number</label> </br> <input class="grey-background" type="number" id="phone" name="phone number"/>
                </div>
                <div>
                    <button type="submit">Submit</button>
                </div>
            </fieldset>
        </form>
    </body>
</html>
